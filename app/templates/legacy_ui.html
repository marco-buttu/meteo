<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Meteo Legacy Command UI</title>
  <style>
    :root { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; line-height: 1.45; }
    body { margin: 0; background: #f6f7fb; color: #1f2937; }
    main { max-width: 1040px; margin: 0 auto; padding: 32px 20px 48px; }
    h1 { margin: 0 0 8px; font-size: 2rem; }
    h2 { margin-top: 0; font-size: 1.2rem; }
    .layout { display: grid; grid-template-columns: minmax(0, 1fr) minmax(280px, 0.75fr); gap: 20px; margin-top: 24px; }
    .card { background: #fff; border: 1px solid #d9dee8; border-radius: 14px; box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06); padding: 20px; }
    label { display: block; font-weight: 650; margin-bottom: 6px; }
    select, input, button { box-sizing: border-box; width: 100%; font: inherit; border-radius: 10px; border: 1px solid #c8d0dc; padding: 10px 12px; background: #fff; color: #111827; }
    button { cursor: pointer; border: 0; background: #1f2937; color: #fff; font-weight: 700; margin-top: 14px; }
    button:disabled { cursor: not-allowed; opacity: 0.55; }
    .field { margin: 14px 0; }
    .help { color: #4b5563; font-size: 0.92rem; margin-top: 6px; }
    .description { color: #374151; margin-bottom: 16px; }
    .command-preview, pre { background: #111827; color: #e5e7eb; border-radius: 12px; padding: 14px; overflow-x: auto; white-space: pre-wrap; word-break: break-word; }
    .status-pill { display: inline-block; border-radius: 999px; padding: 4px 10px; background: #e5e7eb; color: #111827; font-weight: 700; font-size: 0.9rem; }
    .status-finished { background: #d1fae5; color: #065f46; }
    .status-failed, .status-error { background: #fee2e2; color: #991b1b; }
    .status-running { background: #dbeafe; color: #1e40af; }
    .error { color: #991b1b; font-weight: 700; }
    .hidden { display: none; }
    code { background: #eef2f7; border-radius: 6px; padding: 2px 5px; }
    @media (max-width: 820px) { .layout { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <main>
    <h1>Meteo Legacy Command UI</h1>
    <p>Choose a legacy command, fill in the required parameters, run it, and inspect job status and result.</p>
    <div class="layout">
      <section class="card">
        <h2>Run command</h2>
        <div class="field">
          <label for="commandSelect">Command</label>
          <select id="commandSelect"></select>
        </div>
        <p id="commandDescription" class="description"></p>
        <form id="commandForm"></form>
        <div>
          <label>Generated legacy command</label>
          <div id="commandPreview" class="command-preview"></div>
        </div>
        <button id="runButton" type="button">Run</button>
        <p id="formError" class="error hidden"></p>
      </section>
      <aside class="card">
        <h2>Parameter help</h2>
        <div id="parameterHelp"></div>
      </aside>
    </div>
    <section class="card" style="margin-top: 20px;">
      <h2>Job</h2>
      <p>Job ID: <strong id="jobId">-</strong></p>
      <p>Status: <span id="jobStatus" class="status-pill">idle</span></p>
      <pre id="jobMetadata">No job submitted yet.</pre>
    </section>
    <section class="card" style="margin-top: 20px;">
      <h2>Result</h2>
      <pre id="jobResult">No result yet.</pre>
    </section>
  </main>
  <script>
    let commandCatalog = [];
    let selectedCommand = null;
    let pollTimer = null;
    const commandSelect = document.getElementById("commandSelect");
    const commandDescription = document.getElementById("commandDescription");
    const commandForm = document.getElementById("commandForm");
    const commandPreview = document.getElementById("commandPreview");
    const parameterHelp = document.getElementById("parameterHelp");
    const runButton = document.getElementById("runButton");
    const formError = document.getElementById("formError");
    const jobId = document.getElementById("jobId");
    const jobStatus = document.getElementById("jobStatus");
    const jobMetadata = document.getElementById("jobMetadata");
    const jobResult = document.getElementById("jobResult");
    function setError(message) { formError.textContent = message; formError.classList.toggle("hidden", !message); }
    function setStatus(status) {
      jobStatus.textContent = status;
      jobStatus.className = "status-pill";
      if (status === "finished") jobStatus.classList.add("status-finished");
      else if (status === "failed") jobStatus.classList.add("status-failed");
      else if (status === "error") jobStatus.classList.add("status-error");
      else if (status === "queued" || status === "started" || status === "submitting") jobStatus.classList.add("status-running");
    }
    function prettyJson(value) { return JSON.stringify(value, null, 2); }
    function getInputValue(parameter) {
      const input = document.getElementById(`param-${parameter.name}`);
      return input ? input.value.trim() : "";
    }
    function buildLegacyCommand() {
      if (!selectedCommand) return "";
      const values = selectedCommand.parameters.map((parameter) => getInputValue(parameter));
      return [selectedCommand.name, ...values].join(",");
    }
    function validateForm() {
      if (!selectedCommand) return "No command selected.";
      for (const parameter of selectedCommand.parameters) {
        const value = getInputValue(parameter);
        if (parameter.required && !value) return `${parameter.label} is required.`;
        if (parameter.pattern && !(new RegExp(parameter.pattern)).test(value)) return `${parameter.label} has an invalid format.`;
        if (parameter.type === "integer") {
          const number = Number(value);
          if (!Number.isInteger(number)) return `${parameter.label} must be an integer.`;
          if (parameter.min !== undefined && number < parameter.min) return `${parameter.label} must be greater than or equal to ${parameter.min}.`;
          if (parameter.max !== undefined && number > parameter.max) return `${parameter.label} must be less than or equal to ${parameter.max}.`;
        }
        if (parameter.type === "number" && !Number.isFinite(Number(value))) return `${parameter.label} must be a number.`;
      }
      return "";
    }
    function updatePreview() { commandPreview.textContent = buildLegacyCommand(); setError(""); }
    function renderSelectedCommand() {
      selectedCommand = commandCatalog.find((command) => command.name === commandSelect.value);
      if (!selectedCommand) return;
      commandDescription.textContent = selectedCommand.description;
      commandForm.innerHTML = "";
      parameterHelp.innerHTML = "";
      for (const parameter of selectedCommand.parameters) {
        const field = document.createElement("div");
        field.className = "field";
        const label = document.createElement("label");
        label.setAttribute("for", `param-${parameter.name}`);
        label.textContent = parameter.label;
        const input = document.createElement("input");
        input.id = `param-${parameter.name}`;
        input.name = parameter.name;
        input.type = parameter.input_type || "text";
        input.placeholder = parameter.placeholder || "";
        input.required = Boolean(parameter.required);
        if (parameter.min !== undefined) input.min = parameter.min;
        if (parameter.max !== undefined) input.max = parameter.max;
        if (parameter.step !== undefined) input.step = parameter.step;
        input.addEventListener("input", updatePreview);
        const help = document.createElement("div");
        help.className = "help";
        help.textContent = parameter.help;
        field.appendChild(label);
        field.appendChild(input);
        field.appendChild(help);
        commandForm.appendChild(field);
        const helpItem = document.createElement("p");
        helpItem.innerHTML = `<strong>${parameter.label}</strong><br>${parameter.help}`;
        parameterHelp.appendChild(helpItem);
      }
      const example = document.createElement("p");
      example.innerHTML = `<strong>Example</strong><br><code>${selectedCommand.example}</code>`;
      parameterHelp.appendChild(example);
      updatePreview();
    }
    async function fetchJson(url, options) {
      const response = await fetch(url, options);
      const text = await response.text();
      let payload = null;
      if (text) {
        try { payload = JSON.parse(text); } catch (error) { payload = { raw_response: text }; }
      }
      if (!response.ok) {
        const message = payload && payload.error ? payload.error.message : `HTTP ${response.status}`;
        throw new Error(message);
      }
      return payload;
    }
    async function pollJob(currentJobId) {
      try {
        const metadata = await fetchJson(`/jobs/${currentJobId}`);
        jobMetadata.textContent = prettyJson(metadata);
        setStatus(metadata.status);
        if (metadata.status === "finished") {
          clearInterval(pollTimer);
          pollTimer = null;
          if (metadata.has_result) jobResult.textContent = prettyJson(await fetchJson(`/jobs/${currentJobId}/result`));
          else jobResult.textContent = "The job finished without a JSON result.";
        } else if (metadata.status === "failed") {
          clearInterval(pollTimer);
          pollTimer = null;
          jobResult.textContent = metadata.error ? prettyJson(metadata.error) : "The job failed.";
        }
      } catch (error) {
        clearInterval(pollTimer);
        pollTimer = null;
        setStatus("error");
        jobResult.textContent = error.message;
      }
    }
    async function runCommand() {
      const validationError = validateForm();
      if (validationError) { setError(validationError); return; }
      const command = buildLegacyCommand();
      runButton.disabled = true;
      setError("");
      jobId.textContent = "-";
      setStatus("submitting");
      jobMetadata.textContent = "Submitting job...";
      jobResult.textContent = "No result yet.";
      if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
      try {
        const metadata = await fetchJson("/legacy/command", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ command }),
        });
        jobId.textContent = metadata.job_id || "-";
        jobMetadata.textContent = prettyJson(metadata);
        setStatus(metadata.status || "queued");
        if (metadata.job_id) {
          await pollJob(metadata.job_id);
          pollTimer = setInterval(() => pollJob(metadata.job_id), 1000);
        }
      } catch (error) {
        setStatus("error");
        jobMetadata.textContent = error.message;
        jobResult.textContent = "No result.";
      } finally {
        runButton.disabled = false;
      }
    }
    async function init() {
      try {
        const catalog = await fetchJson("/legacy/commands");
        commandCatalog = catalog.commands || [];
        for (const command of commandCatalog) {
          const option = document.createElement("option");
          option.value = command.name;
          option.textContent = command.label;
          commandSelect.appendChild(option);
        }
        commandSelect.addEventListener("change", renderSelectedCommand);
        runButton.addEventListener("click", runCommand);
        renderSelectedCommand();
      } catch (error) {
        commandDescription.textContent = "Unable to load command catalog.";
        setError(error.message);
        runButton.disabled = true;
      }
    }
    init();
  </script>
</body>
</html>
